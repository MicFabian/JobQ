plugins {
    id 'java-library'
    id 'groovy'
    id 'org.springframework.boot' version '4.0.0' apply false
    id 'io.spring.dependency-management' version '1.1.4'
    id 'com.diffplug.spotless' version '7.2.1'
    id 'maven-publish'
    id 'signing'
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'
}

group = 'io.github.micfabian'
def defaultVersion = '0.0.2-SNAPSHOT'
version = (findProperty('releaseVersion') ?: System.getenv('RELEASE_VERSION') ?: defaultVersion).toString()
def isReleaseVersion = !version.toString().endsWith('-SNAPSHOT')
def prop = { String key, String fallback = '' ->
    (findProperty(key) ?: fallback).toString()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
    maven { url = uri('https://repo.spring.io/milestone') }
    maven { url = uri('https://repo.spring.io/snapshot') }
}

dependencyManagement {
    imports {
        mavenBom org.springframework.boot.gradle.plugin.SpringBootPlugin.BOM_COORDINATES
    }
}

dependencies {
    // Spring Boot Starter
    api 'org.springframework.boot:spring-boot-starter'

    // Spring Boot Auto-Configuration Processor
    annotationProcessor 'org.springframework.boot:spring-boot-autoconfigure-processor'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // Web (for dashboard API)
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // JPA for database operations
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // PostgreSQL Driver
    compileOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.postgresql:postgresql'

    // Jackson for JSON serialization
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // SLF4J for logging
    implementation 'org.slf4j:slf4j-api'

    // Observability (Optional)
    compileOnly 'io.micrometer:micrometer-core'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'io.micrometer:micrometer-core'
    testImplementation 'org.awaitility:awaitility:4.2.2'
    
    // Testcontainers for isolated DB testing
    testImplementation 'org.postgresql:postgresql'
    testImplementation 'org.testcontainers:testcontainers:1.20.0'
    testImplementation 'org.testcontainers:postgresql:1.20.0'
    testImplementation 'org.testcontainers:junit-jupiter:1.20.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(Test).configureEach {
    // Keep Mockito/ByteBuddy stable on newer JDKs while suppressing JVM attach/CDS warnings.
    jvmArgs "-Dnet.bytebuddy.experimental=true", "-XX:+EnableDynamicAgentLoading", "-Xshare:off"
    testLogging {
        events "failed", "skipped"
        exceptionFormat "short"
        showStandardStreams = false
    }
}

tasks.named('test', Test) {
    useJUnitPlatform {
        excludeTags 'load', 'perf'
    }
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
    options.addBooleanOption('Xdoclint:none', true)
}

spotless {
    java {
        target 'src/*/java/**/*.java'
        palantirJavaFormat()
    }
}

tasks.register('loadTest', Test) {
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'load'
    }
    description = 'Runs JobQ load and stress tests'
    group = 'verification'
    jvmArgs "-Dnet.bytebuddy.experimental=true", "-XX:+EnableDynamicAgentLoading", "-Xshare:off"
}

tasks.register('perfTest', Test) {
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'perf'
    }
    description = 'Runs JobQ performance benchmark tests'
    group = 'verification'
    jvmArgs "-Dnet.bytebuddy.experimental=true", "-XX:+EnableDynamicAgentLoading", "-Xshare:off"
}

tasks.register('writeTestRuntimeClasspath') {
    dependsOn testClasses
    description = 'Writes the test runtime classpath to build/jobq/test-runtime-classpath.txt'
    group = 'verification'
    def outputFile = layout.buildDirectory.file('jobq/test-runtime-classpath.txt')
    outputs.file(outputFile)
    doLast {
        def file = outputFile.get().asFile
        file.parentFile.mkdirs()
        file.text = sourceSets.test.runtimeClasspath.asPath
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'jobq-spring-boot-starter'
            versionMapping {
                usage('java-api') {
                    fromResolutionOf('runtimeClasspath')
                }
                usage('java-runtime') {
                    fromResolutionResult()
                }
            }
            pom {
                name = prop('POM_NAME', 'JobQ Spring Boot Starter')
                description = prop('POM_DESCRIPTION',
                        'PostgreSQL-backed background job processing for Spring Boot with transactional enqueueing.')
                url = prop('POM_URL', 'https://github.com/MicFabian/JobQ')

                licenses {
                    license {
                        name = prop('POM_LICENSE_NAME', 'The Apache License, Version 2.0')
                        url = prop('POM_LICENSE_URL', 'https://www.apache.org/licenses/LICENSE-2.0.txt')
                        distribution = 'repo'
                    }
                }

                developers {
                    developer {
                        id = prop('POM_DEVELOPER_ID', 'micfabian')
                        name = prop('POM_DEVELOPER_NAME', 'Michael Fabian')
                        email = prop('POM_DEVELOPER_EMAIL', 'mvirks@web.de')
                    }
                }

                scm {
                    connection = prop('POM_SCM_CONNECTION', 'scm:git:https://github.com/MicFabian/JobQ.git')
                    developerConnection = prop('POM_SCM_DEV_CONNECTION', 'scm:git:ssh://git@github.com:MicFabian/JobQ.git')
                    url = prop('POM_SCM_URL', 'https://github.com/MicFabian/JobQ')
                }
            }
        }
    }
}

signing {
    required = isReleaseVersion
    def signingKey = findProperty('signingKey')?.toString()
    def signingPassword = findProperty('signingPassword')?.toString()
    if (signingKey) {
        def normalizedSigningKey = signingKey
                .replace('\r', '')
                .replace('\\n', '\n')
                .trim()
        useInMemoryPgpKeys(normalizedSigningKey, signingPassword)
    } else {
        useGpgCmd()
    }
    sign publishing.publications
}

nexusPublishing {
    repositories {
        sonatype {
            nexusUrl = uri('https://ossrh-staging-api.central.sonatype.com/service/local/')
            snapshotRepositoryUrl = uri('https://central.sonatype.com/repository/maven-snapshots/')
            username = prop('sonatypeUsername')
            password = prop('sonatypePassword')
        }
    }
}

tasks.register('publishToMavenCentral') {
    group = 'publishing'
    description = 'Publishes this project to Maven Central via Sonatype Central Portal'
    if (isReleaseVersion) {
        dependsOn 'publishToSonatype', 'closeAndReleaseSonatypeStagingRepository'
    } else {
        dependsOn 'publishToSonatype'
    }
}
