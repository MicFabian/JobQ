spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:postgresql://${testcontainers.postgresql.host}:${testcontainers.postgresql.port}/${testcontainers.postgresql.database}
    username: ${testcontainers.postgresql.username}
    password: ${testcontainers.postgresql.password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false

jobq:
  background-job-server:
    notify-enabled: false

logging:
  level:
    root: WARN
    com.jobq: WARN
    com.zaxxer.hikari: ERROR
    org.hibernate.orm.jdbc.error: ERROR
    org.testcontainers: WARN
    tc: WARN
