name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Install dashboard smoke dependencies
        run: npm ci --prefix scripts

      - name: Install Playwright browser
        run: npm exec --prefix scripts playwright install --with-deps chromium

      - name: Run dashboard smoke test
        run: ./scripts/dashboard-smoke.sh

      - name: Upload dashboard smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-smoke-artifacts
          path: output/playwright/dashboard-smoke/
          if-no-files-found: ignore
